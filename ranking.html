<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>랭킹 — 프론티어</title>
<style>
:root {
  --bg:#2C2C2E; --panel:#3A3A3C; --panel2:#48484A;
  --border:#555558; --gold:#F5C842;
  --text:#F2F2F7; --muted:#AEAEB2;
  --red:#FF453A; --green:#30D158; --blue:#0A84FF;
}
*{box-sizing:border-box;margin:0;padding:0;}
body {
  font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  background:var(--bg); color:var(--text);
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; padding:32px 16px 60px;
}
.header { text-align:center; margin-bottom:28px; }
.header h1 { font-size:1.8rem; font-weight:800; color:var(--gold); letter-spacing:2px; margin-bottom:4px; }
.header p  { font-size:0.8rem; color:var(--muted); }
.btn-back {
  position:fixed; top:20px; left:20px;
  background:var(--panel2); border:1px solid var(--border);
  border-radius:10px; color:var(--text); font-size:0.85rem;
  font-weight:600; padding:8px 14px; cursor:pointer;
  font-family:inherit; transition:border-color 0.15s;
  text-decoration:none; display:inline-block;
}
.btn-back:hover { border-color:var(--gold); color:var(--gold); }

.rank-table {
  width:100%; max-width:640px;
  background:var(--panel); border:1px solid var(--border);
  border-radius:16px; overflow:hidden;
}
.rank-header {
  display:grid; grid-template-columns:56px 1fr 100px 90px 90px;
  padding:12px 20px; background:var(--panel2);
  font-size:0.72rem; color:var(--muted); font-weight:700;
  text-transform:uppercase; letter-spacing:1px;
  border-bottom:1px solid var(--border);
}
.rank-row {
  display:grid; grid-template-columns:56px 1fr 100px 90px 90px;
  padding:14px 20px; border-bottom:1px solid var(--border);
  transition:background 0.12s; align-items:center;
}
.rank-row:last-child { border-bottom:none; }
.rank-row:hover { background:var(--panel2); }
.rank-row.me { background:rgba(245,200,66,0.06); border-left:3px solid var(--gold); }

.rank-num {
  font-size:1rem; font-weight:800; color:var(--muted);
  text-align:center;
}
.rank-num.top1 { color:#FFD700; font-size:1.3rem; }
.rank-num.top2 { color:#C0C0C0; font-size:1.15rem; }
.rank-num.top3 { color:#CD7F32; font-size:1.1rem; }

.player-info { display:flex; flex-direction:column; gap:3px; }
.player-name { font-size:0.9rem; font-weight:700; }
.player-tier {
  font-size:0.68rem; padding:1px 6px; border-radius:4px;
  font-weight:700; display:inline-block; width:fit-content;
}
.tier-bronze  { background:rgba(205,127,50,0.2);  color:#CD7F32; }
.tier-silver  { background:rgba(192,192,192,0.2); color:#C0C0C0; }
.tier-gold    { background:rgba(255,215,0,0.2);   color:#FFD700; }
.tier-plat    { background:rgba(48,209,88,0.2);   color:#30D158; }
.tier-diamond { background:rgba(10,132,255,0.2);  color:#0A84FF; }

.elo-val {
  font-size:1.05rem; font-weight:800; color:var(--gold);
  font-family:'Consolas',monospace; text-align:right;
}
.record { font-size:0.78rem; color:var(--muted); text-align:right; }
.winrate { font-size:0.85rem; font-weight:700; text-align:right; }

.loading {
  padding:40px; text-align:center; color:var(--muted); font-size:0.9rem;
  display:flex; flex-direction:column; align-items:center; gap:12px;
}
.spinner {
  width:24px; height:24px; border:3px solid var(--border);
  border-top-color:var(--gold); border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

.updated-at {
  margin-top:16px; font-size:0.72rem; color:var(--muted); text-align:center;
}
.empty { padding:40px; text-align:center; color:var(--muted); }

@media(max-width:520px) {
  .rank-header, .rank-row {
    grid-template-columns:44px 1fr 80px 70px;
  }
  .rank-header > *:nth-child(5),
  .rank-row   > *:nth-child(5) { display:none; }
}
</style>
</head>
<body>

<a href="index.html" class="btn-back">← 로비</a>

<div class="header">
  <h1>🏆 랭킹</h1>
  <p>프론티어 온라인 대전 ELO 레이팅 순위</p>
</div>

<div class="rank-table" id="rank-table">
  <div class="rank-header">
    <div style="text-align:center">#</div>
    <div>플레이어</div>
    <div style="text-align:right">ELO</div>
    <div style="text-align:right">전적</div>
    <div style="text-align:right">승률</div>
  </div>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span>랭킹 불러오는 중...</span>
  </div>
</div>
<div class="updated-at" id="updated-at"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script>
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyD_bv9vLqcMDMZgGHNLS2A94INXqkO8XX8",
  authDomain:        "ooooomok-285e6.firebaseapp.com",
  databaseURL:       "https://ooooomok-285e6-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "ooooomok-285e6",
  storageBucket:     "ooooomok-285e6.firebasestorage.app",
  messagingSenderId: "764275385569",
  appId:             "1:764275385569:web:44cecc18de9aef4d9a43a0",
};

firebase.initializeApp(FIREBASE_CONFIG);
const db   = firebase.database();
const auth = firebase.auth();

let myUid = null;

function getTier(elo) {
  if (elo < 1100) return { label:'브론즈',   cls:'tier-bronze'  };
  if (elo < 1250) return { label:'실버',     cls:'tier-silver'  };
  if (elo < 1400) return { label:'골드',     cls:'tier-gold'    };
  if (elo < 1600) return { label:'플래티넘', cls:'tier-plat'    };
  return               { label:'다이아몬드', cls:'tier-diamond' };
}

function renderRanking(entries) {
  const table = document.getElementById('rank-table');
  const header = table.querySelector('.rank-header');
  // 기존 로딩/행 제거
  table.querySelectorAll('.loading,.rank-row').forEach(el => el.remove());

  if (entries.length === 0) {
    table.insertAdjacentHTML('beforeend',
      '<div class="empty">아직 랭킹 데이터가 없습니다.</div>');
    return;
  }

  entries.forEach((e, i) => {
    const rank  = i + 1;
    const tier  = getTier(e.elo);
    const total = (e.wins||0) + (e.losses||0) + (e.draws||0);
    const wr    = total > 0 ? Math.round((e.wins||0)/total*100) : 0;
    const isMe  = e.uid === myUid;

    const numClass = rank===1 ? 'top1' : rank===2 ? 'top2' : rank===3 ? 'top3' : '';
    const numText  = rank===1 ? '🥇' : rank===2 ? '🥈' : rank===3 ? '🥉' : rank;

    const row = document.createElement('div');
    row.className = 'rank-row' + (isMe ? ' me' : '');
    row.innerHTML = `
      <div class="rank-num ${numClass}">${numText}</div>
      <div class="player-info">
        <div class="player-name">${escHtml(e.nickname || '익명')}${isMe ? ' <span style="color:var(--gold);font-size:0.7rem;">나</span>' : ''}</div>
        <span class="player-tier ${tier.cls}">${tier.label}</span>
      </div>
      <div class="elo-val">${e.elo}</div>
      <div class="record">${e.wins||0}승 ${e.losses||0}패 ${e.draws||0}무</div>
      <div class="winrate" style="color:${wr>=60?'var(--green)':wr>=40?'var(--text)':'var(--red)'}">${wr}%</div>
    `;
    table.appendChild(row);
  });

  // 내가 50위 밖이면 내 정보 하단에 별도 표시
  const myInTop = entries.some(e => e.uid === myUid);
  if (!myInTop && myUid) {
    db.ref('leaderboard/' + myUid).once('value', snap => {
      if (!snap.exists()) return;
      const me = snap.val();
      const tier = getTier(me.elo||1200);
      const total = (me.wins||0)+(me.losses||0)+(me.draws||0);
      const wr = total>0 ? Math.round((me.wins||0)/total*100) : 0;
      const row = document.createElement('div');
      row.className = 'rank-row me';
      row.innerHTML = `
        <div class="rank-num">—</div>
        <div class="player-info">
          <div class="player-name">${escHtml(me.nickname||'익명')} <span style="color:var(--gold);font-size:0.7rem;">나</span></div>
          <span class="player-tier ${tier.cls}">${tier.label}</span>
        </div>
        <div class="elo-val">${me.elo||1200}</div>
        <div class="record">${me.wins||0}승 ${me.losses||0}패 ${me.draws||0}무</div>
        <div class="winrate" style="color:${wr>=60?'var(--green)':wr>=40?'var(--text)':'var(--red)'}">${wr}%</div>
      `;
      table.appendChild(row);
    });
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function loadRanking() {
  db.ref('leaderboard').orderByChild('elo').limitToLast(50).on('value', snap => {
    const entries = [];
    snap.forEach(child => {
      entries.push({ uid: child.key, ...child.val() });
    });
    // 내림차순 정렬
    entries.sort((a,b) => (b.elo||0) - (a.elo||0));
    renderRanking(entries);

    const now = new Date();
    document.getElementById('updated-at').textContent =
      `마지막 업데이트: ${now.toLocaleTimeString('ko-KR')}`;
  });
}

// 인증 후 랭킹 로드
auth.onAuthStateChanged(user => {
  if (user) {
    myUid = user.uid;
  } else {
    auth.signInAnonymously().catch(()=>{});
  }
  loadRanking();
});
</script>
</body>
</html>
